name: build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: hardware-encryption-test-linux-x64
            binary_path: dist/hardware-encryption-test
          - os: windows-latest
            artifact_name: hardware-encryption-test-windows-x64
            binary_path: dist/hardware-encryption-test.exe
          - os: macos-latest
            artifact_name: hardware-encryption-test-macos
            binary_path: dist/hardware-encryption-test

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'x64'

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build
        run: pyinstaller --onefile --name hardware-encryption-test app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.binary_path }}
            testdata/lorem-500kb.txt
